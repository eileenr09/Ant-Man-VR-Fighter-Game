<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANT COLONY: DESCENT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
#c{display:block;width:100vw;height:100vh}
#overlay{position:fixed;inset:0;pointer-events:none;z-index:10}

/* Vignette */
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%);pointer-events:none}

/* Damage flash */
#dmg{position:absolute;inset:0;background:rgba(200,30,0,0);transition:background 0.05s;pointer-events:none}

/* Crosshair */
#xh{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px}
#xh::before,#xh::after{content:'';position:absolute;background:rgba(255,200,80,0.9)}
#xh::before{width:2px;height:24px;left:11px;top:0}
#xh::after{width:24px;height:2px;top:11px;left:0}
#xh-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:rgba(255,200,80,0.9)}

/* Stats panel */
#stats{position:absolute;top:16px;left:16px;color:#e8c87a;font-size:12px;letter-spacing:1px;line-height:1.9;text-shadow:0 0 8px rgba(220,120,0,0.8)}
#stats .lbl{color:rgba(200,150,60,0.6);font-size:10px}

/* HP bar */
#hpbar{position:absolute;top:16px;right:16px;width:180px}
#hpbar .label{color:rgba(200,150,60,0.7);font-size:10px;letter-spacing:2px;margin-bottom:5px;text-align:right}
#hpbar-track{height:8px;background:rgba(0,0,0,0.6);border:1px solid rgba(200,120,30,0.4);border-radius:1px;overflow:hidden}
#hpbar-fill{height:100%;width:100%;background:linear-gradient(90deg,#8b2,#bf4);transition:width .15s,background .3s;border-radius:1px}

/* Queen bar */
#qbar-wrap{position:absolute;top:46px;right:16px;width:180px;display:none}
#qbar-wrap .label{color:rgba(255,60,60,0.8);font-size:10px;letter-spacing:2px;margin-bottom:5px;text-align:right}
#qbar-track{height:8px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,60,60,0.5);border-radius:1px;overflow:hidden}
#qbar-fill{height:100%;width:100%;background:linear-gradient(90deg,#800,#f44);transition:width .15s;border-radius:1px}

/* Weapon slot (hidden - replaced by hotbar) */
#wslot{display:none}

/* ── Fortnite-style hotbar ── */
#hotbar{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
  align-items:flex-end;
  pointer-events:none;
}
.hslot{
  width:64px;height:72px;
  background:rgba(0,0,0,0.55);
  border:2px solid rgba(200,150,50,0.3);
  border-radius:4px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  transition:transform 0.1s, border-color 0.1s, background 0.1s;
  color:#e8c87a;
}
.hslot .slot-icon{font-size:26px;line-height:1;filter:drop-shadow(0 0 4px rgba(255,180,0,0.5))}
.hslot .slot-name{font-size:7px;letter-spacing:1px;color:rgba(220,160,60,0.7);margin-top:2px;text-align:center;max-width:58px;overflow:hidden;white-space:nowrap}
.hslot .slot-ammo{font-size:8px;color:rgba(255,220,100,0.6);margin-top:1px}
.hslot .slot-key{
  position:absolute;bottom:3px;right:5px;
  font-size:8px;color:rgba(200,150,60,0.5);letter-spacing:0;
}
.hslot.active{
  background:rgba(40,25,0,0.85);
  border-color:rgba(255,180,40,0.9);
  transform:translateY(-6px) scale(1.08);
  box-shadow:0 0 14px rgba(255,160,0,0.5);
}
.hslot.active .slot-key{color:rgba(255,200,80,0.9)}
.hslot.empty{opacity:0.3}

/* Zone flash */
#zone-flash{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:#e8c87a;font-size:13px;letter-spacing:4px;text-shadow:0 0 12px rgba(255,160,0,0.9);opacity:0;transition:opacity .4s;white-space:nowrap}

/* Kill feed */
#kfeed{position:absolute;bottom:28px;left:16px;color:rgba(255,120,60,0.85);font-size:11px;letter-spacing:1px;text-shadow:0 0 6px rgba(255,60,0,0.6);line-height:1.8}

/* Center message */
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#e8c87a;font-size:16px;text-align:center;line-height:1.8;letter-spacing:1px;background:rgba(0,0,0,0.85);padding:28px 44px;border:1px solid rgba(200,120,30,0.35);display:none;max-width:500px;text-shadow:0 0 10px rgba(255,160,0,0.4)}

/* Pickup prompt */
#pickup-hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);color:rgba(100,255,180,0.9);font-size:11px;letter-spacing:3px;text-shadow:0 0 10px rgba(0,255,120,0.6);opacity:0;transition:opacity .2s}

/* Instructions */
#inst{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(200,150,60,0.35);font-size:10px;letter-spacing:1px;white-space:nowrap}

/* Breathing overlay for atmosphere */
#breath{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(20,5,0,0.15) 100%);animation:breathe 4s ease-in-out infinite;pointer-events:none}
@keyframes breathe{0%,100%{opacity:0.4}50%{opacity:1}}

/* Scan lines */
#scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;opacity:0.6}

/* VR button */
#vr-btn{position:fixed;bottom:18px;right:16px;padding:9px 20px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:2px;color:#e8c87a;background:rgba(0,0,0,0.8);border:1px solid rgba(200,120,30,0.6);cursor:pointer;z-index:20;transition:background .2s,border-color .2s}
#vr-btn:hover{background:rgba(40,20,0,0.9);border-color:rgba(255,160,40,0.9)}
#no-xr-msg{position:fixed;bottom:18px;right:16px;color:rgba(200,100,30,0.6);font-size:10px;letter-spacing:1px;display:none;z-index:20}
</style>
</head>

<script>
'use strict';
// ════════════════════════════════════════════════════════
//  ANT COLONY: DESCENT  —  High-Performance Rewrite
// ════════════════════════════════════════════════════════

// ── Renderer ────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:false, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d0500, 0.055);
scene.background = new THREE.Color(0x0d0500);

const camera = new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.05,80);
camera.position.set(0,1.6,8);

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── Shared clock ────────────────────────────────────────
const clock = new THREE.Clock();

// ── DOM cache — avoid getElementById every frame ─────────
const E={
  hp:document.getElementById('s-hp'),
  kills:document.getElementById('s-kills'),
  depth:document.getElementById('s-depth'),
  hpFill:document.getElementById('hpbar-fill'),
  qFill:document.getElementById('qbar-fill'),
  qWrap:document.getElementById('qbar-wrap'),
  wIcon:document.getElementById('w-icon'),
  wName:document.getElementById('w-name'),
  wAmmo:document.getElementById('w-ammo'),
  zFlash:document.getElementById('zone-flash'),
  kfeed:document.getElementById('kfeed'),
  msg:document.getElementById('msg'),
  hint:document.getElementById('pickup-hint'),
  xh:document.getElementById('xh'),
  dmg:document.getElementById('dmg'),
};

// ── GEOMETRY HELPERS ────────────────────────────────────
function rnd(a,b){return a+(b-a)*Math.random();}
function lerp(a,b,t){return a+(b-a)*t;}

// ── ORGANIC TUNNEL BUILDER ──────────────────────────────
function buildTunnel(path, radius, radialSegs, tubularSegs, roughness){
  const curve = new THREE.CatmullRomCurve3(path);
  const positions=[], normals=[], colors=[], indices=[];
  const frames = curve.computeFrenetFrames(tubularSegs, false);
  const N=radialSegs, M=tubularSegs;

  for(let i=0;i<=M;i++){
    const t=i/M;
    const pt = curve.getPoint(t);
    const norm = frames.normals[Math.min(i,frames.normals.length-1)];
    const binorm = frames.binormals[Math.min(i,frames.binormals.length-1)];
    const depthFactor = 0.5+0.5*t;

    for(let j=0;j<=N;j++){
      const ang = (j/N)*Math.PI*2;
      const nx = Math.cos(ang), ny = Math.sin(ang);
      const bump = roughness*(
        Math.sin(ang*3+i*0.7)*0.3+
        Math.sin(ang*2-i*1.1)*0.25+
        Math.cos(ang*5+i*0.3)*0.15
      );
      const r = radius+bump;

      const dx = nx*norm.x + ny*binorm.x;
      const dy = nx*norm.y + ny*binorm.y;
      const dz = nx*norm.z + ny*binorm.z;

      positions.push(pt.x+dx*r, pt.y+dy*r, pt.z+dz*r);
      normals.push(-dx,-dy,-dz);

      const grime = 0.55+0.2*Math.sin(ang*4+i*1.3+Math.random()*0.1);
      const cr = lerp(0.28,0.18,depthFactor)*grime;
      const cg = lerp(0.16,0.08,depthFactor)*grime;
      const cb = lerp(0.06,0.02,depthFactor)*grime;
      colors.push(cr,cg,cb);
    }
  }

  for(let i=0;i<M;i++){
    for(let j=0;j<N;j++){
      const a=(N+1)*i+j, b=a+N+1;
      indices.push(a,b,a+1, b,b+1,a+1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(normals,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.setIndex(indices);

  const mat = new THREE.MeshLambertMaterial({vertexColors:true,side:THREE.BackSide});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.receiveShadow=false;
  return mesh;
}

// ── WORLD LAYOUT ────────────────────────────────────────
const MAIN_PATH = [
  new THREE.Vector3(0,1.6,10),
  new THREE.Vector3(2,0.5,2),
  new THREE.Vector3(-1,-1,-4),
  new THREE.Vector3(3,-4,-12),
  new THREE.Vector3(-2,-5,-18),
  new THREE.Vector3(1,-8,-26),
  new THREE.Vector3(-3,-10,-32),
  new THREE.Vector3(2,-13,-40),
  new THREE.Vector3(-1,-14,-48),
  new THREE.Vector3(0,-16,-55),
  new THREE.Vector3(0,-16,-62),
];

const mainTunnel = buildTunnel(MAIN_PATH, 3.2, 14, 100, 0.55);
scene.add(mainTunnel);

const BRANCH_PATHS = [
  [new THREE.Vector3(3,-2,-8), new THREE.Vector3(6,-3,-10), new THREE.Vector3(8,-2,-14), new THREE.Vector3(10,-4,-16)],
  [new THREE.Vector3(-3,-4,-14), new THREE.Vector3(-7,-5,-16), new THREE.Vector3(-9,-4,-20)],
  [new THREE.Vector3(2,-8,-28), new THREE.Vector3(5,-9,-30), new THREE.Vector3(7,-8,-34)],
  [new THREE.Vector3(-2,-10,-34), new THREE.Vector3(-5,-12,-36), new THREE.Vector3(-6,-11,-40)],
];
BRANCH_PATHS.forEach(pts=>{
  scene.add(buildTunnel(pts,2.0,10,20,0.6));
});

// ── FLOOR MESH ───────────────────────────────────────────
function buildFloor(path){
  const curve = new THREE.CatmullRomCurve3(path);
  const pts=[], idxs=[];
  const W=2.6, segs=80;
  for(let i=0;i<=segs;i++){
    const t=i/segs;
    const p=curve.getPoint(t);
    const tangent=curve.getTangent(t);
    const right=new THREE.Vector3().crossVectors(tangent,new THREE.Vector3(0,1,0)).normalize();
    pts.push(p.x-right.x*W,p.y-1.35,p.z-right.z*W);
    pts.push(p.x+right.x*W,p.y-1.35,p.z+right.z*W);
  }
  for(let i=0;i<segs;i++){
    const a=i*2,b=a+2;
    idxs.push(a,b,a+1,b,b+1,a+1);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  geo.setIndex(idxs);
  geo.computeVertexNormals();
  const mat=new THREE.MeshLambertMaterial({color:0x1a0a03,side:THREE.DoubleSide});
  return new THREE.Mesh(geo,mat);
}
const xrTeleportFloor = buildFloor(MAIN_PATH);
scene.add(xrTeleportFloor);

// ── LIGHTING SYSTEM ──────────────────────────────────────
const lights=[];
function addLight(x,y,z,color,intensity,dist){
  const l=new THREE.PointLight(color,intensity,dist);
  l.position.set(x,y,z);
  scene.add(l);
  lights.push(l);
  return l;
}

scene.add(new THREE.AmbientLight(0x1a0800, 0.4));

const lightData=[
  [0,1,8, 0xcc6622,0.9,12],
  [0,-0.5,-4, 0x995511,0.7,10],
  [1,-3,-12, 0x774422,1.0,14],
  [-1,-5,-18, 0x883300,0.8,10],
  [0,-8,-26, 0x662200,1.2,16],
  [2,-8,-26, 0x00aa44,0.6,8],
  [-2,-8,-26,0x00aa44,0.6,8],
  [0,-12,-38, 0x551100,1.0,14],
  [0,-14,-48, 0x880022,1.5,18],
  [0,-16,-58, 0xff0033,2.0,20],
  [3,-16,-58, 0xff1100,1.0,12],
  [-3,-16,-58,0xff1100,1.0,12],
];
lightData.forEach(d=>addLight(...d));

const queenPulse = addLight(0,-16,-62,0xff0022,3.0,25);

// ── DECORATIVE ELEMENTS ──────────────────────────────────
function addMushroom(x,y,z,scale,glowColor){
  const g=new THREE.Group();
  const stemGeo=new THREE.CylinderGeometry(0.04*scale,0.06*scale,0.25*scale,6);
  const capGeo=new THREE.SphereGeometry(0.16*scale,8,5);
  capGeo.scale(1,0.55,1);
  const glowMat=new THREE.MeshBasicMaterial({color:glowColor});
  const stemMat=new THREE.MeshLambertMaterial({color:0x8b6030});
  const stem=new THREE.Mesh(stemGeo,stemMat);
  stem.position.set(0,0.125*scale,0);
  g.add(stem);
  const cap=new THREE.Mesh(capGeo,glowMat);
  cap.position.y=0.27*scale;
  g.add(cap);
  const ml=new THREE.PointLight(glowColor,0.4,3*scale);
  ml.position.y=0.3*scale;
  g.add(ml);
  g.position.set(x,y,z);
  scene.add(g);
  return g;
}

const mushroomColors=[0x00ff88,0x88ff00,0x00ffcc,0x44ff44];
const mushroomPositions=[
  [2.5,0,-2,0.9],[-2.8,0.2,-6,0.7],[-2.5,-2,-10,1.1],[2.8,-3,-14,0.8],
  [2.5,-5,-20,1.2],[-2.8,-5,-22,0.9],[2.5,-8,-28,1.0],[-2.5,-9,-30,0.8],
  [2.5,-12,-36,1.1],[-2.5,-13,-40,0.9],
];
mushroomPositions.forEach(([x,y,z,s])=>addMushroom(x,y,z,s,mushroomColors[Math.floor(Math.random()*mushroomColors.length)]));

function addRoots(x,y,z,count){
  for(let i=0;i<count;i++){
    const len=rnd(0.3,1.1);
    const pts=[new THREE.Vector3(x+rnd(-0.5,0.5),y,z+rnd(-0.5,0.5))];
    let cx=pts[0].x,cy=pts[0].y,cz=pts[0].z;
    for(let j=0;j<3;j++){cx+=rnd(-0.1,0.1);cy-=len/3;cz+=rnd(-0.1,0.1);pts.push(new THREE.Vector3(cx,cy,cz));}
    const curve=new THREE.CatmullRomCurve3(pts);
    const geo=new THREE.TubeGeometry(curve,6,0.012,4,false);
    const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0x3a1a06}));
    scene.add(mesh);
  }
}
[[0,2.8,-3,8],[1,1.2,-8,6],[-1,-0.8,-14,7],[0,-2,-20,5],[0,-6,-28,6],
 [0,-11,-36,5],[0,-14,-44,6]].forEach(([x,y,z,n])=>addRoots(x,y,z,n));

function addEggCluster(cx,cy,cz){
  for(let i=0;i<14;i++){
    const angle=rnd(0,Math.PI*2), r=rnd(0.5,2.5);
    const geo=new THREE.SphereGeometry(rnd(0.15,0.28),6,5);
    geo.scale(1,1.35,1);
    const mat=new THREE.MeshLambertMaterial({color:0xfff0d0,transparent:true,opacity:0.88});
    const m=new THREE.Mesh(geo,mat);
    m.position.set(cx+Math.cos(angle)*r, cy+rnd(0,0.2), cz+Math.sin(angle)*r);
    scene.add(m);
  }
}
addEggCluster(0,-16.8,-60);
addEggCluster(3,-16.8,-58);
addEggCluster(-3,-16.8,-62);

for(let i=0;i<60;i++){
  const t=Math.random();
  const pt=new THREE.CatmullRomCurve3(MAIN_PATH).getPoint(t);
  const r=rnd(0.04,0.15);
  const geo=new THREE.SphereGeometry(r,4,3);
  const mat=new THREE.MeshLambertMaterial({color:new THREE.Color(rnd(0.12,0.22),rnd(0.06,0.1),rnd(0.01,0.04))});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(pt.x+rnd(-1.5,1.5), pt.y-1.3+r, pt.z+rnd(-1,1));
  m.scale.set(rnd(0.7,1.4),rnd(0.4,0.9),rnd(0.7,1.4));
  scene.add(m);
}

// ── WEAPONS ──────────────────────────────────────────────
const WEAPONS=[
  {name:'MAGNIFYING GLASS',icon:'🔍',dmg:18,range:4,ammo:-1,cd:0.5,desc:'Focused heat beam'},
  {name:'BUG SPRAY',       icon:'💨',dmg:9, range:7,ammo:35,cd:0.15,desc:'Chemical aerosol'},
  {name:'STEEL BOOT',      icon:'👢',dmg:32,range:2,ammo:-1,cd:0.9, desc:'Maximum stomping'},
  {name:'FLAMETHROWER',    icon:'🔥',dmg:14,range:5,ammo:25,cd:0.12,desc:'Incendiary burst'},
  {name:'TWEEZERS',        icon:'🩺',dmg:48,range:2,ammo:-1,cd:1.1, desc:'Surgical precision'},
  {name:'ANT ACID',        icon:'⚗️', dmg:22,range:5,ammo:18,cd:0.25,desc:'Corrosive spray'},
];

const pickups=[];
const mainCurve=new THREE.CatmullRomCurve3(MAIN_PATH);

function spawnWeapon(t,wIdx){
  const pt=mainCurve.getPoint(t);
  const w=WEAPONS[wIdx];
  const geo=new THREE.SphereGeometry(0.18,8,7);
  const mat=new THREE.MeshBasicMaterial({color:0xffcc44});
  const orb=new THREE.Mesh(geo,mat);
  orb.position.set(pt.x+rnd(-1,1), pt.y-0.8, pt.z+rnd(-0.5,0.5));
  scene.add(orb);
  const ringGeo=new THREE.TorusGeometry(0.28,0.03,6,20);
  const ringMat=new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0.7});
  const ring=new THREE.Mesh(ringGeo,ringMat);
  ring.position.copy(orb.position);
  scene.add(ring);
  const pl=new THREE.PointLight(0xffaa00,1.2,3.5);
  pl.position.copy(orb.position);
  scene.add(pl);
  pickups.push({weapon:w,orb,ring,pl,pos:orb.position.clone(),active:true,t});
}

spawnWeapon(0.05,0);
spawnWeapon(0.1, 1);
spawnWeapon(0.18,2);
spawnWeapon(0.28,3);
spawnWeapon(0.42,4);
spawnWeapon(0.55,5);
spawnWeapon(0.7, 1);
spawnWeapon(0.8, 3);

// ── FLOOR HEIGHT — precomputed for fast lookup ───────────
// Bakes mainCurve samples so getFloorY never calls getPoint() at runtime
const _FLT_N=120;
const _fltPX=new Float32Array(_FLT_N+1);
const _fltPY=new Float32Array(_FLT_N+1);
const _fltPZ=new Float32Array(_FLT_N+1);
(()=>{

    const p=mainCurve.getPoint(i/_FLT_N);
    _fltPX[i]=p.x;_fltPY[i]=p.y;_fltPZ[i]=p.z;
  }
})();

function getFloorY(px,pz){
  let bestIdx=0,bestDist=1e9;
  for(let i=0;i<=_FLT_N;i++){
    const dx=px-_fltPX[i],dz=pz-_fltPZ[i];
    const d=dx*dx+dz*dz;
    if(d<bestDist){bestDist=d;bestIdx=i;}
  }
  return _fltPY[bestIdx]-1.2;
}

// ── ANT INSTANCED MESH ───────────────────────────────────
const MAX_ANTS=40;
const antGeo=(()=>{
  const geo=new THREE.BufferGeometry();
  const verts=[], norms=[], cols=[];
  const idxs=[];
  let offset=0;

  function addSphere(cx,cy,cz,r,R,G,B){
    const segs=6, rings=5;
    const base=offset;
    for(let iy=0;iy<=rings;iy++){
      const v=iy/rings, phi=v*Math.PI;
      for(let ix=0;ix<=segs;ix++){
        const u=ix/segs, theta=u*Math.PI*2;
        const x=cx+r*Math.sin(phi)*Math.cos(theta);
        const y=cy+r*Math.cos(phi);
        const z=cz+r*Math.sin(phi)*Math.sin(theta);
        verts.push(x,y,z);
        norms.push(Math.sin(phi)*Math.cos(theta),Math.cos(phi),Math.sin(phi)*Math.sin(theta));
        cols.push(R,G,B);
        offset++;
      }
    }
    for(let iy=0;iy<rings;iy++){
      for(let ix=0;ix<segs;ix++){
        const a=base+(segs+1)*iy+ix;
        const b=a+(segs+1);
        idxs.push(a,b,a+1,b,b+1,a+1);
      }
    }
  }

  function addCylinder(x1,y1,z1,x2,y2,z2,r,R,G,B){
    const segs=4,base=offset;
    const dx=x2-x1,dy=y2-y1,dz=z2-z1;
    const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
    const ux=dx/len,uy=dy/len,uz=dz/len;
    let rx,ry,rz;
    if(Math.abs(uy)<0.9){rx=0;ry=1;rz=0;}else{rx=1;ry=0;rz=0;}
    const bx=uy*rz-uz*ry, by=uz*rx-ux*rz, bz=ux*ry-uy*rx;
    const blen=Math.sqrt(bx*bx+by*by+bz*bz);
    const _bx=bx/blen,_by=by/blen,_bz=bz/blen;
    const _rx=uy*_bz-uz*_by,_ry=uz*_bx-ux*_bz,_rz=ux*_by-uy*_bx;
    for(let cap=0;cap<2;cap++){
      const px=cap?x2:x1,py=cap?y2:y1,pz=cap?z2:z1;
      for(let i=0;i<=segs;i++){
        const a=i/segs*Math.PI*2;
        const nx=Math.cos(a)*_rx+Math.sin(a)*_bx;
        const ny=Math.cos(a)*_ry+Math.sin(a)*_by;
        const nz=Math.cos(a)*_rz+Math.sin(a)*_bz;
        verts.push(px+nx*r,py+ny*r,pz+nz*r);
        norms.push(nx,ny,nz);
        cols.push(R,G,B);
        offset++;
      }
    }
    for(let i=0;i<segs;i++){
      const a=base+i, b=base+(segs+1)+i;
      idxs.push(a,b,a+1,b,b+1,a+1);
    }
  }

  addSphere(0,0,0.18,  0.095, 0.12,0.06,0.01);
  addSphere(0,0,0.0,   0.075, 0.10,0.05,0.01);
  addSphere(0,0,-0.24, 0.135, 0.14,0.07,0.01);

  const legPairs=[[0.08,0],[0,0],[-0.1,0]];
  legPairs.forEach(([lz])=>{
    [-1,1].forEach(s=>{
      addCylinder(0.06*s,0,lz,0.22*s,-0.12,lz-0.04,0.018,0.1,0.05,0.01);
    });
  });

  addCylinder(0.04,0.06,0.22,  0.09,0.16,0.3,  0.01,0.1,0.05,0.01);
  addCylinder(-0.04,0.06,0.22,-0.09,0.16,0.3,  0.01,0.1,0.05,0.01);

  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(norms,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
  geo.setIndex(idxs);
  return geo;
})();

// Current weapon visual index
let _handWeaponIdx = -1;

function rebuildHandWeapon(weaponIdx){
  if(weaponIdx === _handWeaponIdx) return;
  _handWeaponIdx = weaponIdx;
  // Remove all children except flash
  while(handGroup.children.length > 0) handGroup.remove(handGroup.children[0]);
  handGroup.add(flashMesh); // re-add flash
  if(weaponIdx >= 0 && WEAPON_VISUALS[weaponIdx]){
    WEAPON_VISUALS[weaponIdx](handGroup);
  }
}

let recoilT=0, flashT=0;
window._pistolFire = function(){
  recoilT=0.16; flashT=0.09;
};
window._pistolUpdate = function(dt){
  if(recoilT>0){
    recoilT-=dt;
    const k=Math.max(0,recoilT/0.16);
    handGroup.position.z=-0.32+k*0.07;
    handGroup.rotation.x=-k*0.22;
  } else {
    handGroup.position.z=-0.32;
    handGroup.rotation.x=0;
  }
  if(flashT>0){
    flashT-=dt;
    flashMat.opacity=Math.max(0,flashT/0.09);
    flashMesh.scale.setScalar(0.7+Math.random()*0.6);
  } else { flashMat.opacity=0; }

  // Sync weapon visual to active slot
  const w = getCurWeapon();
  if(w){
    const wIdx = WEAPONS.indexOf(w);
    if(wIdx !== _handWeaponIdx) rebuildHandWeapon(wIdx);
  } else if(_handWeaponIdx !== -1){
    rebuildHandWeapon(-1);
  }
};

// ── ATTACK ───────────────────────────────────────────────
const ray=new THREE.Raycaster();
function doAttack(){
  if(gameOver||gameWon)return;
  const curWeapon = getCurWeapon();
  if(!curWeapon){showMsg('FIND A WEAPON FIRST\n[ E ] to pick up glowing orb',1600);return;}
  if(attackCd>0)return;
  const slot = inventory[activeSlot];
  if(curWeapon.ammo!==-1){
    if(slot.ammo<=0){showMsg('OUT OF AMMO\n[ E ] find more',1000);return;}
    slot.ammo--;
    slotEls[activeSlot].querySelector('.slot-ammo').textContent = slot.ammo;
  }
  attackCd=curWeapon.cd;
  if(window._pistolFire) window._pistolFire();

  E.xh.style.opacity='0.1';
  setTimeout(()=>E.xh.style.opacity='1',80);

  if(queenObj.alive){
    ray.setFromCamera({x:0,y:0},camera);
    const qhits=ray.intersectObject(queenMesh,true);
    if(qhits.length>0&&qhits[0].distance<=curWeapon.range+1){
      queenObj.hp-=curWeapon.dmg;
      if(queenObj.hp<=0){
        queenObj.alive=false;
        scene.remove(queenMesh);
        gameWon=true;
        E.kfeed.innerHTML='👑 QUEEN DESTROYED';
        E.qFill.style.width='0%';
        showMsg('🏆 VICTORY\n\nThe Queen Ant is dead.\nThe colony crumbles.\n\nYou are the destroyer.',0);
      } else {
        drawQueenBar(queenObj.hp/queenObj.maxHp);
        E.qFill.style.width=Math.max(0,queenObj.hp/queenObj.maxHp*100)+'%';
      }
      return;
    }
  }

  const sphere=new THREE.Sphere();
  ray.setFromCamera({x:0,y:0},camera); // set once before the loop
  for(const ant of antObjs){
    if(!ant.alive)continue;
    const dist=camera.position.distanceTo(ant.pos);
    if(dist>curWeapon.range+2.5)continue;
    // Use a sphere sized to match 4.5x scaled ant body (~1.2 world-unit radius)
    sphere.set(ant.pos,1.8);
    if(ray.ray.intersectsSphere(sphere)){
      ant.hp-=curWeapon.dmg;
      ant.drawBar(Math.max(0,ant.hp/ant.maxHp));
      if(ant.hp<=0){
        ant.alive=false;
        dummy.position.copy(ant.pos);
        dummy.scale.setScalar(0);
        dummy.updateMatrix();
        antInstanced.setMatrixAt(ant.idx,dummy.matrix);
        antInstanced.instanceMatrix.needsUpdate=true;
        scene.remove(ant.hpGroup);
        kills++;
        E.kills.textContent=kills;
        E.kfeed.textContent=`ELIMINATED ×${kills}`;
        setTimeout(()=>{if(!E.kfeed.textContent.includes('QUEEN'))E.kfeed.textContent='';},2000);
      }
      break;
    }
  }
}

const _XR_ARC_N=30, _xrArcPos=new Float32Array(_XR_ARC_N*3);
const _xrArcGeo=new THREE.BufferGeometry();
_xrArcGeo.setAttribute('position',new THREE.BufferAttribute(_xrArcPos,3));
const _xrArcLine=new THREE.Line(_xrArcGeo,
  new THREE.LineBasicMaterial({color:0x00ccff,transparent:true,opacity:0.8}));
_xrArcLine.frustumCulled=false; _xrArcLine.visible=false; scene.add(_xrArcLine);

const _xrTmpMat=new THREE.Matrix4(), _xrTpRay=new THREE.Raycaster();
const _xrCamWP=new THREE.Vector3(), _xrArcV0=new THREE.Vector3();
const _xrArcP=new THREE.Vector3(), _xrArcQ=new THREE.Vector3(), _xrArcSD=new THREE.Vector3();
let _xrTpTarget=null, _xrTpAiming=false, _xrSnapCd=false;

function _xrComputeArc(){
  xrCtrl[1].getWorldPosition(_xrArcP);
  _xrTmpMat.identity().extractRotation(xrCtrl[1].matrixWorld);
  _xrArcV0.set(0,0,-1).applyMatrix4(_xrTmpMat).multiplyScalar(6);
  const DT=0.08,G=12; let hitPt=null,nPts=0;
  for(let i=0;i<_XR_ARC_N-1;i++){
    _xrArcPos[i*3]=_xrArcP.x; _xrArcPos[i*3+1]=_xrArcP.y; _xrArcPos[i*3+2]=_xrArcP.z;
    nPts=i+1;
    _xrArcQ.set(_xrArcP.x+_xrArcV0.x*DT, _xrArcP.y+_xrArcV0.y*DT, _xrArcP.z+_xrArcV0.z*DT);
    _xrArcSD.subVectors(_xrArcQ,_xrArcP);
    const segLen=_xrArcSD.length(); if(segLen<0.0001) break;
    _xrArcSD.divideScalar(segLen);
    _xrTpRay.set(_xrArcP,_xrArcSD); _xrTpRay.far=segLen+0.05;
    const hits=_xrTpRay.intersectObject(xrTeleportFloor,false);
    if(hits.length>0){
      hitPt=hits[0].point.clone();
      _xrArcPos[nPts*3]=hitPt.x; _xrArcPos[nPts*3+1]=hitPt.y; _xrArcPos[nPts*3+2]=hitPt.z;
      nPts++; break;
    }
    _xrArcP.copy(_xrArcQ); _xrArcV0.y-=G*DT;
    if(_xrArcP.y<-22) break;
  }
  _xrArcGeo.setDrawRange(0,nPts); _xrArcGeo.attributes.position.needsUpdate=true;
  return hitPt;
}

function updateXR(){
  const session=renderer.xr.getSession(); if(!session) return;
  session.inputSources.forEach(src=>{
    if(!src.gamepad||src.handedness!=='left') return;
    const axes=src.gamepad.axes;
    const sx=axes[2]!==undefined?axes[2]:(axes[0]||0);
    const sy=axes[3]!==undefined?axes[3]:(axes[1]||0);
    const mag=Math.sqrt(sx*sx+sy*sy);
    if(mag>0.5){
      _xrTpAiming=true; if(_xrLeftRay) _xrLeftRay.visible=false;
      _xrTpTarget=_xrComputeArc(); _xrArcLine.visible=true;
      if(_xrTpTarget){ _xrReticle.position.set(_xrTpTarget.x,_xrTpTarget.y+0.02,_xrTpTarget.z); _xrReticle.visible=true; }
      else { _xrReticle.visible=false; }
    } else if(_xrTpAiming&&mag<0.25){
      _xrTpAiming=false; _xrReticle.visible=false; _xrArcLine.visible=false;
      if(_xrLeftRay) _xrLeftRay.visible=true;
      if(_xrTpTarget){
        camera.getWorldPosition(_xrCamWP);
        xrDolly.position.x+=_xrTpTarget.x-_xrCamWP.x;
        xrDolly.position.z+=_xrTpTarget.z-_xrCamWP.z;
        xrDolly.position.y=_xrTpTarget.y; _xrTpTarget=null;
      }
    }
  });
  session.inputSources.forEach(src=>{
    if(!src.gamepad||src.handedness!=='right') return;
    const sx=(src.gamepad.axes[2]!==undefined?src.gamepad.axes[2]:(src.gamepad.axes[0]||0));
    if(!_xrSnapCd&&Math.abs(sx)>0.6){ xrDolly.rotation.y+=sx>0?-Math.PI/6:Math.PI/6; _xrSnapCd=true; }
    if(Math.abs(sx)<0.3) _xrSnapCd=false;
  });
}

// ── MAIN LOOP ────────────────────────────────────────────
let lastZone='';

function animate(){
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  const inXR=renderer.xr&&renderer.xr.isPresenting;
  camera.getWorldPosition(_camWP);

  if(!gameOver&&!gameWon){
    attackCd=Math.max(0,attackCd-dt);
    if(!inXR){
    // ── Player movement ──
    _move.set(0,0,0);
    if(keys['KeyW']||keys['ArrowUp'])   _move.z-=1;
    if(keys['KeyS']||keys['ArrowDown']) _move.z+=1;
    if(keys['KeyA']||keys['ArrowLeft']) _move.x-=1;
    if(keys['KeyD']||keys['ArrowRight'])_move.x+=1;
    if(_move.lengthSq()>0){
      _move.normalize().multiplyScalar(SPEED*dt);
      _move.applyQuaternion(camera.quaternion);
      _move.y=0;
      camera.position.add(_move);
    }
    yVel+=GRAVITY*dt;
    camera.position.y+=yVel*dt;
    const fy=getFloorY(camera.position.x,camera.position.z);
    if(camera.position.y<fy+1.55){camera.position.y=fy+1.55;yVel=0;onGround=true;}
    else{onGround=false;}

    camera.position.x=Math.max(-5,Math.min(5,camera.position.x));
    camera.position.z=Math.max(-65,Math.min(12,camera.position.z));
    } // end !inXR

    // ── Zone detection ──
    const py=_camWP.y;
    const pz=_camWP.z;
    let zone='SURFACE';
    if(pz<-4)zone='UPPER TUNNELS';
    if(py<-3)zone='MID TUNNELS';
    if(py<-9)zone='DEEP COLONY';
    if(py<-14)zone="QUEEN'S CHAMBER";
    if(zone!==lastZone){
      lastZone=zone;
      E.depth.textContent=zone;
      flashZone(zone);
      if(zone==="QUEEN'S CHAMBER"){
        E.qWrap.style.display='block';
        showMsg("⚠ QUEEN'S CHAMBER ⚠\n\nShe is waiting.\nShe is angry.\nKill her.",3000);
      }
    }

    // ── Ant AI — uses pre-allocated _antToP to avoid per-frame allocation ──
    const MIN_RADIUS = 2.2; // ants must stay at least this far from player (XZ)
    let antDirty=false;
    for(const ant of antObjs){
      if(!ant.alive)continue;
      ant.bobT+=dt*4;
      _antToP.subVectors(camera.position,ant.pos);
      _antToP.y=0;
      const dist=_antToP.length();

      // Clamp ant Y to floor so they never go underground
      const floorY = getFloorY(ant.pos.x, ant.pos.z);
      ant.pos.y = floorY + 0.1; // sit just on top of floor

      if(dist<14&&dist>MIN_RADIUS){
        _antToP.normalize().multiplyScalar(ant.speed*dt);
        ant.pos.x += _antToP.x;
        ant.pos.z += _antToP.z;
        // Re-clamp after move
        ant.pos.y = getFloorY(ant.pos.x, ant.pos.z) + 0.1;
      } else if(dist <= MIN_RADIUS){
        // Push ant away so it can't slide under player
        const pushBack = _antToP.clone().normalize().multiplyScalar(-(MIN_RADIUS - dist + 0.05));
        ant.pos.x += pushBack.x;
        ant.pos.z += pushBack.z;
        ant.pos.y = getFloorY(ant.pos.x, ant.pos.z) + 0.1;
      }

      const angle=Math.atan2(
        camera.position.x-ant.pos.x,
        camera.position.z-ant.pos.z
      );
      dummy.position.copy(ant.pos);
      dummy.position.y = ant.pos.y + Math.sin(ant.bobT)*0.04;
      dummy.rotation.set(Math.sin(ant.bobT*0.5)*0.15,angle,0);
      dummy.scale.setScalar(4.5);
      dummy.updateMatrix();
      antInstanced.setMatrixAt(ant.idx,dummy.matrix);
      ant.hpGroup.position.set(ant.pos.x, ant.pos.y + 2.2, ant.pos.z);
      antDirty=true;
      if(dist<3.5){
        ant.attackCd-=dt;
        if(ant.attackCd<=0){
          ant.attackCd=1.2;
          playerHp=Math.max(0,playerHp-ant.dmg);
          E.hp.textContent=Math.round(playerHp);
          const pct=playerHp/100;
          E.hpFill.style.width=pct*100+'%';
          E.hpFill.style.background=
            pct>0.5?'linear-gradient(90deg,#8b2,#bf4)':
            pct>0.25?'linear-gradient(90deg,#b80,#fd4)':
            'linear-gradient(90deg,#800,#f44)';
          hitFlashT=0.2;
          if(playerHp<=0){
            gameOver=true;
            showMsg('YOU DIED\n\nThe colony consumed you.\n\nRefresh to descend again.',0);
          }
        }
      }
    }
    if(antDirty)antInstanced.instanceMatrix.needsUpdate=true;

    // ── Queen AI — uses pre-allocated _queenToP ──
    if(queenObj.alive){
      queenObj.bobT+=dt*1.5;
      _queenToP.subVectors(camera.position,queenObj.pos);
      _queenToP.y=0;
      const dist=_queenToP.length();
      if(dist<18&&dist>0.1){
        _queenToP.normalize().multiplyScalar(queenObj.speed*dt);
        queenObj.pos.add(_queenToP);
        queenMesh.position.copy(queenObj.pos);
        queenMesh.position.y+=Math.sin(queenObj.bobT)*0.06;
        queenMesh.rotation.y=Math.atan2(
          camera.position.x-queenObj.pos.x,
          camera.position.z-queenObj.pos.z
        );
        if(dist<3.5){
          queenObj.attackCd-=dt;
          if(queenObj.attackCd<=0){
            queenObj.attackCd=0.7;
            playerHp=Math.max(0,playerHp-queenObj.dmg);
            E.hp.textContent=Math.round(playerHp);
            const pct=playerHp/100;
            E.hpFill.style.width=pct*100+'%';
            hitFlashT=0.3;
            if(playerHp<=0){gameOver=true;showMsg('YOU DIED\n\nThe Queen destroyed you.\n\nRefresh to try again.',0);}
          }
        }
      }
    }

    // ── Damage flash ──
    if(hitFlashT>0){
      hitFlashT=Math.max(0,hitFlashT-dt);
      E.dmg.style.background=`rgba(200,30,0,${hitFlashT*1.8})`;
    }else{
      E.dmg.style.background='rgba(200,30,0,0)';
    }

    // ── Pickup proximity hint + animation ──
    let nearPickup=false;
    pickups.forEach(p=>{
      if(!p.active)return;
      const d=camera.position.distanceTo(p.pos);
      if(d<2.5)nearPickup=true;
      p.orb.rotation.y+=dt*1.2;
      p.ring.rotation.x+=dt*1.5;
      p.ring.rotation.z+=dt*0.8;
      p.orb.position.y=p.pos.y+Math.sin(t*2+p.t*10)*0.08;
      p.ring.position.y=p.orb.position.y;
    });
    E.hint.style.opacity=nearPickup?'1':'0';
    // Food proximity hint
    if(typeof foodPickups!=='undefined'){
      const nearFood=foodPickups.some(p=>p.active&&camera.position.distanceTo(p.pos)<2.8);
      if(nearFood&&!nearPickup) { E.hint.style.opacity='1'; E.hint.textContent='[ E ] PICK UP FOOD'; }
      else if(!nearFood&&!nearPickup) E.hint.textContent='[ E ] PICK UP WEAPON';
    }

    // ── Particle animation ──
    const ppos=particles.geometry.attributes.position.array;
    for(let i=0;i<PART_COUNT;i++){
      ppos[i*3]+=partVel[i].x;
      ppos[i*3+1]+=partVel[i].y;
      ppos[i*3+2]+=partVel[i].z;
      if(ppos[i*3+1]<getFloorY(ppos[i*3],ppos[i*3+2])){
        const t2=rnd(0,1);
        const pt=mainCurve.getPoint(t2);
        ppos[i*3]=pt.x+rnd(-1,1);
        ppos[i*3+1]=pt.y+1.2;
        ppos[i*3+2]=pt.z+rnd(-0.5,0.5);
      }
    }
    particles.geometry.attributes.position.needsUpdate=true;

    // ── Queen pulse light ──
    queenPulse.intensity=2.5+Math.sin(t*3.5)*1.2;

    // ── Respawn surface ants ──
    const alive=antObjs.filter(a=>a.alive&&!a.isQueen);
    if(alive.length<6&&Math.random()<dt*0.3&&antInstanced.count<MAX_ANTS){
      const st=rnd(0.01,0.35);
      const pt=mainCurve.getPoint(st);
      spawnAnt(pt.x+rnd(-1.5,1.5),pt.y-0.5,pt.z+rnd(-1,1));
    }
  }

  if(window._pistolUpdate) window._pistolUpdate(dt);

  // Animate food pickups
  if(typeof foodPickups!=='undefined'){
    foodPickups.forEach(p=>{
      if(!p.active)return;
      p.orb.position.y = p.pos.y + Math.sin(t*2+p.pos.x)*0.1;
      p.ls.position.y  = p.pos.y + Math.sin(t*2+p.pos.x)*0.1 + 0.45;
      p.orb.rotation.y += 0.02;
    });
  }

  if(inXR) updateXR();
  renderer.render(scene,camera);
}

// ── START ────────────────────────────────────────────────
showMsg(
  '🐜  ANT COLONY: DESCENT  🐜\n\n'+
  'Click to lock mouse\n\n'+
  'WASD — Move  |  Mouse — Look\n'+
  'Click — Attack  |  E — Pick up\n'+
  '1-5 — Switch weapon  |  F — Eat food\n'+
  'Space — Jump\n\n'+
  'You start armed. Find green orbs for food.\nDescend to the Queen\'s Chamber.\nDestroy her.',
  6000
);
renderer.setAnimationLoop(animate);
</script>
