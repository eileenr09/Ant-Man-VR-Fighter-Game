<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ant Colony VR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0400;font-family:'Courier New',monospace}
#c{display:block;width:100vw;height:100vh}
#overlay{position:fixed;inset:0;pointer-events:none;z-index:10}

/* Health */
#hud-hp{position:absolute;top:16px;left:16px;color:#e8c87a;font-size:12px;letter-spacing:1px;line-height:1.6}
#php{font-size:17px;font-weight:bold;letter-spacing:0}
#pbar-track{width:140px;height:6px;background:rgba(0,0,0,0.6);border:1px solid rgba(200,120,30,0.4);border-radius:2px;overflow:hidden;margin-top:3px}
#pbar-fill{height:100%;width:100%;background:#44ff44;transition:width .15s,background .3s}

/* Weapon slot */
#hud-weapon{position:absolute;top:16px;right:16px;text-align:right;color:#e8c87a}
#weapon-icon{font-size:26px;line-height:1}
#weapon-name{font-size:10px;letter-spacing:2px;color:rgba(220,160,60,0.7);margin-top:2px}
#ammo{font-size:10px;color:rgba(200,150,60,0.6);margin-top:1px}

/* Queen HP */
#queen-hp-wrap{position:absolute;top:60px;right:16px;width:150px;display:none}
#queen-hp-wrap .qlabel{color:rgba(255,60,60,0.8);font-size:9px;letter-spacing:2px;margin-bottom:3px;text-align:right}
#qbar-track{height:6px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,60,60,0.4);border-radius:2px;overflow:hidden}
#queen-hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#800,#f44);transition:width .15s}

/* Crosshair */
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;color:rgba(255,200,80,0.9)}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:currentColor}
#crosshair::before{width:2px;height:18px;left:8px;top:0}
#crosshair::after{width:18px;height:2px;top:8px;left:0}

/* Zone label */
#zone-label{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);color:#e8c87a;font-size:16px;letter-spacing:4px;text-shadow:0 0 12px rgba(255,160,0,0.9);opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap}

/* Message overlay */
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#e8c87a;font-size:13px;text-align:center;line-height:1.8;letter-spacing:1px;background:rgba(0,0,0,0.85);padding:22px 36px;border:1px solid rgba(200,120,30,0.35);display:none;max-width:430px}

/* Kill feed */
#kill-feed{position:absolute;bottom:24px;left:16px;color:rgba(255,120,60,0.85);font-size:11px;letter-spacing:1px}

/* Stats */
#stats{position:absolute;bottom:14px;right:16px;color:rgba(200,150,60,0.5);font-size:9px;text-align:right;line-height:1.7}

/* VR hints */
#teleport-hint{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);color:rgba(80,200,255,0.85);font-size:9px;letter-spacing:3px;opacity:0;transition:opacity .3s;white-space:nowrap}
#grab-hint{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);color:rgba(100,255,180,0.85);font-size:9px;letter-spacing:3px;opacity:0;transition:opacity .2s}

/* VR / desktop button */
#vr-btn{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:9px 22px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;color:#e8c87a;background:rgba(0,0,0,0.8);border:1px solid rgba(200,120,30,0.6);cursor:pointer;z-index:20;pointer-events:all;transition:background .2s,border-color .2s}
#vr-btn:hover{background:rgba(40,20,0,0.9);border-color:rgba(255,160,40,0.9)}
#no-xr-msg{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(200,100,30,0.6);font-size:10px;letter-spacing:1px;display:none;z-index:20}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="hud-hp">
    <span style="font-size:9px;letter-spacing:2px;color:rgba(200,150,60,0.6)">HEALTH &nbsp;</span><span id="php">100</span>
    <div id="pbar-track"><div id="pbar-fill"></div></div>
  </div>
  <div id="hud-weapon">
    <div id="weapon-icon">·</div>
    <div id="weapon-name">UNARMED</div>
    <div id="ammo"></div>
  </div>
  <div id="queen-hp-wrap">
    <div class="qlabel">QUEEN</div>
    <div id="qbar-track"><div id="queen-hp-fill"></div></div>
  </div>
  <div id="crosshair"></div>
  <div id="zone-label"></div>
  <div id="msg"></div>
  <div id="kill-feed"></div>
  <div id="stats">
    ZONE: <span id="zone">Surface</span><br>
    KILLS: <span id="kills">0</span>
  </div>
  <div id="teleport-hint">LEFT STICK — AIM TELEPORT &nbsp;·&nbsp; PRESS — GO</div>
  <div id="grab-hint">RIGHT GRIP — GRAB FOOD CRUMB</div>
</div>

<button id="vr-btn">◈ ENTER VR</button>
<div id="no-xr-msg">Desktop mode — WebXR unavailable</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Cannon.js physics -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<!-- Game modules — order matters -->
<script src="world.js"></script>
<script src="ants.js"></script>
<script src="weapons.js"></script>
<script src="player.js"></script>
<script src="hud.js"></script>
<script src="physics.js"></script>
<script src="xr.js"></script>
<script src="main.js"></script>
</body>
</html>
